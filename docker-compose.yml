# Nutti 파이프라인 — Docker Compose 구성
# 사용법:
#   docker compose up --build -d               # 빌드 + 백그라운드 기동
#   docker compose --profile manual run --rm runner run "주제"  # 수동 단건 실행 (runner 서비스)
#     ⚠ --profile manual 필수 — Compose v2.20 미만은 생략 시 "no such service: runner" 실패
#   docker compose logs -f nutti              # 실시간 로그
#   docker compose logs scheduler             # Ofelia 스케줄 등록 확인
#
# 스케줄러: Ofelia (mcuadros/ofelia) — label 방식 cron
#   매일 09:00 KST = UTC 00:00:00 → schedule: "0 0 0 * * *" (6필드 Ofelia robfig/cron: 초·분·시·일·월·요일)
#   no-overlap: "true" → 이전 실행이 끝나지 않으면 다음 트리거를 스킵 (Ofelia 내장 원자 카운터)
#
# 볼륨 영속:
#   ./data:/app/data  → pipeline_state.json, reviews.json, media/
#   ./secrets:/app/secrets:ro  → sa.json (Google 서비스 계정, 읽기 전용)
#
# ⚠ 보안 주의 (scheduler 서비스):
#   scheduler는 Ofelia job-exec 동작을 위해 /var/run/docker.sock 을 마운트한다.
#   이는 Docker API 쓰기 접근이므로 scheduler 컨테이너가 침해되면 호스트 전체 제어가
#   가능하다. VPS의 docker 그룹 멤버십을 최소화하고, 이미지를 특정 다이제스트로
#   고정하는 것을 권장한다. Ofelia 대신 호스트 crontab + docker compose run --rm 을
#   사용하면 docker.sock 마운트 없이 동일 기능을 구현할 수 있다.

# top-level name: 프로젝트 이름을 명시적으로 고정 — 작업 디렉터리에 한글·공백이
# 포함된 경우 Docker Compose v2가 프로젝트 이름을 빈 문자열로 해석하여 모든
# compose 명령이 실패하는 것을 방지한다.
name: nutti

# ── 공통 베이스: nutti / runner 서비스 공유 설정 ─────────────────────────────
# yaml 앵커(x-nutti-base)로 중복 제거 — nutti와 runner가 동일한 image/env_file/
# environment/volumes를 공유한다. nutti는 entrypoint 오버라이드를 추가하고,
# runner는 Dockerfile의 ENTRYPOINT ["nutti"] 를 그대로 사용한다.
x-nutti-base: &nutti-base
  image: nutti:latest
  build:
    context: .
    dockerfile: Dockerfile
  # .env 파일에서 환경변수 로드 (키 없이 dry_run으로도 동작)
  env_file:
    - .env
  environment:
    # 볼륨 마운트 경로와 일치하도록 절대경로 명시 오버라이드
    NUTTI_STATE_PATH: /app/data/pipeline_state.json
    NUTTI_REVIEW_STORE_PATH: /app/data/reviews.json
    NUTTI_MEDIA_DIR: /app/data/media
    # 마스코트 이미지 절대경로 (운영 시 .env에서 오버라이드 가능)
    NUTTI_MASCOT_IMAGE: /app/assets/mascot.png
    TZ: Asia/Seoul
    # 안전 기본값: .env가 없거나 NUTTI_DRY_RUN 미설정이면 true(dry_run) 유지.
    # 우선순위: environment 블록 > env_file(.env) > Dockerfile ENV.
    # 실 운영 시 .env에 NUTTI_DRY_RUN=false 를 명시하면 그 값이 사용된다.
    NUTTI_DRY_RUN: ${NUTTI_DRY_RUN:-true}
    # Google 서비스 계정 키 파일 — 컨테이너 내 절대경로로 명시.
    # .env의 상대경로(secrets/sa.json)보다 우선 적용되어 CWD 변경에 안전하다.
    GOOGLE_SERVICE_ACCOUNT_JSON: /app/secrets/sa.json
  volumes:
    # 파이프라인 상태·리뷰 데이터·영상 산출물 영속화
    - ./data:/app/data
    # Google 서비스 계정 JSON (읽기 전용 마운트)
    - ./secrets:/app/secrets:ro

services:
  # ── nutti: Ofelia job-exec 타깃 (상시 대기) ─────────────────────────────────
  nutti:
    <<: *nutti-base
    restart: unless-stopped
    # ── Ofelia job-exec 설정 ───────────────────────────────────────────────────
    # 레이블 위치: 타깃 컨테이너(nutti)에 부착 — Ofelia가 스캔해서 cron 등록
    labels:
      ofelia.enabled: "true"
      # 스케줄: 매일 UTC 00:00:00 = KST 09:00
      # ⚠ Ofelia(robfig/cron)는 6필드 "초 분 시 일 월 요일"로 해석한다 — 5필드 "0 0 * * *"는
      # 매일 09시가 아니라 엉뚱하게(초=0·분=0·시=*=매시 정각) 동작한다(2026-06-30 무인 검증서
      # 실측: 5필드 "50 1 * * *"는 01:50에 발동 안 함, 6필드는 정상 발동). 반드시 6필드로 쓴다.
      ofelia.job-exec.run-pipeline.schedule: "0 0 0 * * *"
      # nutti run 명령 실행 — docker exec는 ENTRYPOINT를 거치지 않으므로 전체 명령어 지정 필수
      ofelia.job-exec.run-pipeline.command: "nutti run"
      # no-overlap: 이전 실행이 끝나지 않으면 새 트리거 스킵
      # Ofelia 내부 sync/atomic 카운터로 구현
      ofelia.job-exec.run-pipeline.no-overlap: "true"
    # Ofelia가 exec할 때 컨테이너가 살아있어야 하므로 idle 상태 유지
    # ENTRYPOINT=nutti 이므로 command 필드는 nutti 인자로 전달됨 → 직접 sh를 PID1로 만들어야 함
    # entrypoint 오버라이드로 sh가 PID1이 되고, command는 sh에 전달되는 인자(-c의 스크립트)
    entrypoint: ["/bin/sh", "-c"]
    command: ["exec tail -f /dev/null"]

  # ── runner: 수동 단건 실행 전용 one-shot 서비스 ──────────────────────────────
  # `docker compose run --rm runner run "주제"` 로 호출한다.
  # Dockerfile의 ENTRYPOINT ["nutti"] 를 그대로 사용하므로 인자가 nutti 서브커맨드로
  # 직접 전달된다. nutti 서비스와 달리 entrypoint 오버라이드 없음.
  # profiles: [manual] → 평소 `up -d` 에 포함되지 않고 명시적 run 시에만 기동된다.
  runner:
    <<: *nutti-base
    restart: "no"
    profiles:
      - manual

  # ── scheduler: Ofelia cron 스케줄러 ─────────────────────────────────────────
  scheduler:
    image: mcuadros/ofelia:latest
    # docker.sock 마운트 필수 — Ofelia가 Docker API로 컨테이너 레이블 스캔 및 job-exec 호출.
    # ⚠ 쓰기 접근이 필요하므로 :ro 불가 (job-exec는 Docker API 쓰기 연산).
    #   보안 위협: scheduler 컨테이너가 침해되면 호스트 전체 제어 가능.
    #   완화책: no-new-privileges 적용, 이미지를 특정 다이제스트로 고정 권장.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # 권한 상승 차단 — 프로세스가 추가 권한을 획득하지 못하도록 제한
    security_opt:
      - "no-new-privileges:true"
    # daemon --docker: label 방식 활성화 + Docker 이벤트 hot-reload
    command: daemon --docker
    depends_on:
      - nutti
    restart: unless-stopped

# ── 네임드 볼륨 (선택) ────────────────────────────────────────────────────────
# bind mount(./data, ./secrets)를 쓰므로 별도 named volume 불필요.
# named volume이 필요하면 아래 주석 해제:
# volumes:
#   nutti_data:
#   nutti_secrets:
